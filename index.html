<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>French Learning</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #111827;
      --sub: #6b7280;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --green: #16a34a;
      --red: #dc2626;
      --border: #e5e7eb;
    }

    body.dark {
      --bg: #0f172a;
      --card: #111827;
      --text: #f9fafb;
      --sub: #9ca3af;
      --blue-soft: #1e3a8a;
      --border: #374151;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px 16px 90px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .title {
      font-size: 25px;
      font-weight: 800;
    }

    .version {
      font-size: 12px;
      color: var(--sub);
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 12px 16px;
      font-weight: 700;
      background: var(--card);
      color: var(--text);
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      transition: transform .12s, background .12s, color .12s;
    }

    button:active,
    .choice:active,
    .word:active,
    .nav-btn:active {
      background: var(--blue) !important;
      color: white !important;
      transform: scale(.96);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 18px;
    }

    .stat span {
      font-size: 11px;
      color: var(--sub);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
      transition: transform .25s, opacity .25s;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tag {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 700;
    }

    .question {
      font-size: 22px;
      line-height: 1.45;
      font-weight: 800;
      margin: 16px 0 8px;
    }

    .jp {
      font-size: 15px;
      color: var(--sub);
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .blank {
      color: var(--blue);
      border-bottom: 3px solid var(--blue);
      padding: 0 8px;
    }

    .choices {
      display: grid;
      gap: 10px;
      margin: 18px 0;
    }

    .choice {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      font-weight: 800;
      text-align: center;
      transition: .15s;
    }

    .choice.correct {
      background: #dcfce7;
      color: var(--green);
      border-color: var(--green);
    }

    .choice.wrong {
      background: #fee2e2;
      color: var(--red);
      border-color: var(--red);
    }

    .sort-area {
      min-height: 62px;
      border: 2px dashed var(--border);
      border-radius: 18px;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .word-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0;
    }

    .word {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 800;
      transition: .12s;
    }

    .answer-box {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height .35s ease, opacity .35s ease;
    }

    .answer-box.show {
      max-height: 900px;
      opacity: 1;
      margin-top: 18px;
    }

    .explain {
      background: var(--bg);
      border-radius: 18px;
      padding: 14px;
      margin-top: 10px;
      line-height: 1.65;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .controls button {
      flex: 1;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(520px, calc(100% - 24px));
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      background: rgba(255,255,255,.75);
      backdrop-filter: blur(18px);
      padding: 10px;
      border-radius: 24px;
      border: 1px solid var(--border);
    }

    body.dark .bottom-nav {
      background: rgba(17,24,39,.75);
    }

    .nav-btn {
      padding: 10px;
      border-radius: 16px;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      color: var(--sub);
      transition: .12s;
    }

    .nav-btn.active {
      background: var(--blue);
      color: white;
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <div>
        <div class="title">French Learning</div>
        <div class="version">Version 1.6 Starter</div>
      </div>
      <button onclick="toggleDark()">🌙</button>
    </header>

    <div class="stats">
      <div class="stat"><strong id="totalCount">0</strong><span>問題数</span></div>
      <div class="stat"><strong id="correctRate">0%</strong><span>正答率</span></div>
      <div class="stat"><strong id="currentNum">1</strong><span>現在</span></div>
    </div>

    <main id="screen"></main>
  </div>

  <nav class="bottom-nav">
    <div class="nav-btn active" onclick="setMode('learn')">学習</div>
    <div class="nav-btn" onclick="setMode('bookmarks')">保存</div>
    <div class="nav-btn" onclick="setMode('weak')">苦手</div>
    <div class="nav-btn" onclick="setMode('history')">履歴</div>
  </nav>

  <script>
    const questions = [
      {
        id: 1,
        type: "choice",
        level: "A1",
        tag: "構文",
        grammar: "penser que",
        question: "Je ____ que tu as raison.",
        japanese: "私は君が正しいと思う。",
        choices: ["pense", "suis", "vais", "peux"],
        answer: "pense",
        full: "Je pense que tu as raison.",
        english: "I think that you are right.",
        structure: "Je + pense + que + 主語 + 動詞",
        explanation: "penser que は「〜だと思う」。英語の I think that とかなり近いです。",
        nuance: "会話でとても自然。Je pense que... は意見をやわらかく言う基本形です。",
        mistake: "Je pense tu as raison は不可。フランス語では que が必要です。"
      },
      {
        id: 2,
        type: "sort",
        level: "A2",
        tag: "関係代名詞",
        grammar: "qui",
        question: "On a visité une église. Cette église est très connue.",
        japanese: "私たちは教会を訪れた。その教会はとても有名だ。",
        words: ["On", "a", "visité", "une", "église", "qui", "est", "très", "connue"],
        answer: "On a visité une église qui est très connue",
        full: "On a visité une église qui est très connue.",
        english: "We visited a church that is very famous.",
        structure: "名詞 + qui + 動詞",
        explanation: "qui は直前の名詞を主語として説明する関係代名詞です。",
        nuance: "同じ名詞を2回言わずに、自然な1文にできます。",
        mistake: "Cette église をそのまま残さない。qui が主語の役割をします。"
      },
      {
        id: 3,
        type: "choice",
        level: "A1",
        tag: "前置詞",
        grammar: "habiter à",
        question: "J'habite ____ Tokyo.",
        japanese: "私は東京に住んでいます。",
        choices: ["à", "en", "de", "pour"],
        answer: "à",
        full: "J'habite à Tokyo.",
        english: "I live in Tokyo.",
        structure: "habiter + à + 都市名",
        explanation: "都市名の前は基本的に à を使います。",
        nuance: "日常会話でそのまま使える自然な表現です。",
        mistake: "J'habite en Tokyo は不可。en は国名・地域名などで使うことが多いです。"
      },
      {
        id: 4,
        type: "sort",
        level: "A2",
        tag: "関係代名詞",
        grammar: "que",
        question: "Regardez ces photos. J’ai pris ces photos en Espagne.",
        japanese: "この写真を見てください。私はこの写真をスペインで撮りました。",
        words: ["Regardez", "ces", "photos", "que", "j’ai", "prises", "en", "Espagne"],
        answer: "Regardez ces photos que j’ai prises en Espagne",
        full: "Regardez ces photos que j’ai prises en Espagne.",
        english: "Look at these photos that I took in Spain.",
        structure: "名詞 + que + 主語 + 動詞",
        explanation: "que は目的語を受ける関係代名詞です。",
        nuance: "写真・物・人について後ろから説明するときに便利です。",
        mistake: "photos は女性複数なので、書き言葉では prises と一致します。"
      }
    ];

    let currentIndex = 0;
    let mode = "learn";
    let selectedWords = [];

    const state = JSON.parse(localStorage.getItem("frenchLearningState") || "{}");
    state.correct = state.correct || 0;
    state.total = state.total || 0;
    state.bookmarks = state.bookmarks || [];
    state.weak = state.weak || [];
    state.history = state.history || [];

    function save() {
      localStorage.setItem("frenchLearningState", JSON.stringify(state));
    }

    function render() {
      document.getElementById("totalCount").textContent = questions.length;
      document.getElementById("currentNum").textContent = currentIndex + 1;
      document.getElementById("correctRate").textContent =
        state.total ? Math.round(state.correct / state.total * 100) + "%" : "0%";

      if (mode !== "learn") return renderList();

      const q = questions[currentIndex];
      selectedWords = [];

      document.getElementById("screen").innerHTML = `
        <section class="card">
          <div class="meta">
            <span class="tag">${q.level}</span>
            <span class="tag">${q.tag}</span>
            <span class="tag">${q.grammar}</span>
          </div>

          <div class="question">${q.type === "choice" ? q.question.replace("____", "<span class='blank'>____</span>") : q.question}</div>
          <div class="jp">🇯🇵 ${q.japanese}</div>

          ${q.type === "choice" ? renderChoices(q) : renderSort(q)}

          <div class="controls">
            <button onclick="prevQuestion()">前へ</button>
            <button onclick="toggleAnswer()">解説</button>
            <button onclick="nextQuestion()">次へ</button>
          </div>

          <div class="controls">
            <button onclick="bookmark(${q.id})">⭐ 保存</button>
            <button onclick="markWeak(${q.id})">⚠️ 苦手</button>
          </div>

          <div id="answerBox" class="answer-box">
            ${renderExplanation(q)}
          </div>
        </section>
      `;
    }

    function renderChoices(q) {
      return `
        <div class="choices">
          ${q.choices.slice(0,4).map(c => `
            <div class="choice" onclick="answerChoice(this, '${c}')">${c}</div>
          `).join("")}
        </div>
      `;
    }

    function renderSort(q) {
      return `
        <div class="sort-area" id="sortArea"></div>
        <div class="word-bank" id="wordBank">
          ${shuffle([...q.words]).map(w => `
            <div class="word" onclick="pickWord(this, '${w}')">${w}</div>
          `).join("")}
        </div>
        <div class="controls">
          <button onclick="undoWord()">1つ戻す</button>
          <button onclick="checkSort()">答え合わせ</button>
        </div>
      `;
    }

    function renderExplanation(q) {
      return `
        <div class="explain"><b>🇫🇷 答え</b><br>${q.full}</div>
        <div class="explain"><b>🇬🇧 英語なら</b><br>${q.english}</div>
        <div class="explain"><b>🧩 構文</b><br>${q.structure}</div>
        <div class="explain"><b>📖 文法</b><br>${q.explanation}</div>
        <div class="explain"><b>💬 ネイティブのニュアンス</b><br>${q.nuance}</div>
        <div class="explain"><b>⚠️ よくある間違い</b><br>${q.mistake}</div>
      `;
    }

    function answerChoice(el, value) {
      const q = questions[currentIndex];
      state.total++;

      if (value === q.answer) {
        el.classList.add("correct");
        state.correct++;
      } else {
        el.classList.add("wrong");
        state.weak.push(q.id);
      }

      state.history.unshift(q.full);
      state.history = [...new Set(state.history)].slice(0, 20);
      save();
      document.getElementById("answerBox").classList.add("show");
      renderStatsOnly();
    }

    function pickWord(el, word) {
      selectedWords.push(word);
      el.style.display = "none";
      document.getElementById("sortArea").innerHTML += `
        <div class="word">${word}</div>
      `;
    }

    function undoWord() {
      selectedWords.pop();
      render();
    }

    function checkSort() {
      const q = questions[currentIndex];
      const user = selectedWords.join(" ");
      state.total++;

      if (user === q.answer) {
        state.correct++;
        alert("正解！");
      } else {
        state.weak.push(q.id);
        alert("もう少し！解説を見よう。");
      }

      state.history.unshift(q.full);
      state.history = [...new Set(state.history)].slice(0, 20);
      save();
      document.getElementById("answerBox").classList.add("show");
      renderStatsOnly();
    }

    function toggleAnswer() {
      document.getElementById("answerBox").classList.toggle("show");
    }

    function nextQuestion() {
      currentIndex = (currentIndex + 1) % questions.length;
      render();
    }

    function prevQuestion() {
      currentIndex = (currentIndex - 1 + questions.length) % questions.length;
      render();
    }

    function bookmark(id) {
      if (!state.bookmarks.includes(id)) state.bookmarks.push(id);
      save();
      alert("保存しました");
    }

    function markWeak(id) {
      if (!state.weak.includes(id)) state.weak.push(id);
      save();
      alert("苦手問題に追加しました");
    }

    function setMode(newMode) {
      mode = newMode;
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      event.target.classList.add("active");
      render();
    }

    function renderList() {
      let title = "";
      let items = [];

      if (mode === "bookmarks") {
        title = "保存した問題";
        items = questions.filter(q => state.bookmarks.includes(q.id));
      }

      if (mode === "weak") {
        title = "苦手問題";
        items = questions.filter(q => state.weak.includes(q.id));
      }

      if (mode === "history") {
        title = "学習履歴";
        document.getElementById("screen").innerHTML = `
          <section class="card">
            <h2>${title}</h2>
            ${state.history.length ? state.history.map(h => `<div class="explain">${h}</div>`).join("") : "<p>まだ履歴がありません。</p>"}
          </section>
        `;
        return;
      }

      document.getElementById("screen").innerHTML = `
        <section class="card">
          <h2>${title}</h2>
          ${items.length ? items.map(q => `<div class="explain">${q.full}<br><small>${q.japanese}</small></div>`).join("") : "<p>まだありません。</p>"}
        </section>
      `;
    }

    function renderStatsOnly() {
      document.getElementById("correctRate").textContent =
        state.total ? Math.round(state.correct / state.total * 100) + "%" : "0%";
    }

    function toggleDark() {
      document.body.classList.toggle("dark");
    }

    function shuffle(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    render();
  </script>
</body>
</html>
